version: "3.8"

services:
  app:
    build: .
    ports:
      - "3100:3100"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  websocket:
    build:
      context: .
      dockerfile: Dockerfile.ws
    ports:
      - "3101:3101"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  data:
